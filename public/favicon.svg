<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="magicGradient" cx="0.5" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0f1724" stroke="url(#magicGradient)" stroke-width="2"/>
  
  <!-- Magic wand -->
  <g transform="translate(16,16) rotate(-45)" filter="url(#glow)">
    <!-- Wand handle -->
    <rect x="-1" y="-8" width="2" height="12" fill="#8b4513" rx="1"/>
    <!-- Wand tip -->
    <rect x="-0.5" y="-10" width="1" height="2" fill="#fbbf24"/>
    <!-- Magic sparkle -->
    <circle cx="0" cy="-12" r="1.5" fill="#fbbf24" opacity="0.8"/>
  </g>
  
  <!-- Sparkles -->
  <circle cx="8" cy="8" r="1" fill="#7dd3fc" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="12" r="0.8" fill="#fbbf24" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="22" cy="24" r="1.2" fill="#a855f7" opacity="0.5">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Lightning bolt (Harry Potter reference) -->
  <path d="M12 6 L10 10 L12 10 L9 16 L11 12 L9 12 Z" fill="#fbbf24" opacity="0.8" transform="scale(0.8)"/>
</svg>
