<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <radialGradient id="appleGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="appleWandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#daa520;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Rounded rectangle background for iOS -->
  <rect x="10" y="10" width="160" height="160" rx="35" ry="35" fill="url(#appleGradient)" stroke="#2d1b69" stroke-width="3"/>
  
  <!-- Magic wand -->
  <line x1="50" y1="130" x2="110" y2="70" stroke="url(#appleWandGradient)" stroke-width="8" stroke-linecap="round" filter="url(#shadow)"/>
  
  <!-- Wand tip (star) -->
  <g transform="translate(110,70)">
    <path d="M0,-12 L3.6,-3.6 L12,0 L3.6,3.6 L0,12 L-3.6,3.6 L-12,0 L-3.6,-3.6 Z" fill="#ffd700" stroke="#ff6b35" stroke-width="2" filter="url(#shadow)"/>
  </g>
  
  <!-- Magic sparkles -->
  <circle cx="70" cy="50" r="4" fill="#ffd700" opacity="0.9" filter="url(#shadow)"/>
  <circle cx="130" cy="110" r="3.5" fill="#ff6b35" opacity="0.8" filter="url(#shadow)"/>
  <circle cx="40" cy="90" r="3" fill="#7c3aed" opacity="0.7" filter="url(#shadow)"/>
  <circle cx="120" cy="40" r="3.2" fill="#ffd700" opacity="0.8" filter="url(#shadow)"/>
  <circle cx="60" cy="120" r="2.8" fill="#ff6b35" opacity="0.7" filter="url(#shadow)"/>
  
  <!-- Lightning bolt (Harry Potter style) -->
  <path d="M80,25 L70,45 L80,45 L70,65 L90,45 L80,45 Z" fill="#ffd700" stroke="#ff6b35" stroke-width="2" opacity="0.9" filter="url(#shadow)"/>
  
  <!-- Additional magical elements -->
  <circle cx="140" cy="60" r="2.5" fill="#7c3aed" opacity="0.6"/>
  <circle cx="45" cy="45" r="2" fill="#ff6b35" opacity="0.7"/>
  <circle cx="135" cy="135" r="2.2" fill="#ffd700" opacity="0.8"/>
</svg>
